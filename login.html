<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css" type="text/css">
    <title>Login Page</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous">
</head>
<body>
    <div class="navbar">
        <span class="navbar-brand mb-0 h1 sticky-top">
            <a href="index.html" class="btn btn-outline-secondary">back</a>
        </span>
    </div>
    <section class="justify-content-center align-items-center">
        <div class="text-center my-5">
            <h1 class="lead display-4">Login</h1>
        </div>
        <div class="container-lg my-5 p-5 bg-light align-items-center" id="login">
            <form id="loginForm">
                <div class="mb-3">
                    <label for="loginEmail" class="form-label">Email address</label>
                    <input type="email" class="form-control" id="loginEmail" aria-describedby="emailHelp" required>
                    <div id="emailHelp" class="form-text">We'll never share your email with anyone else.</div>
                </div>
                <div class="mb-3">
                    <label for="loginPassword" class="form-label">Password</label>
                    <input type="password" class="form-control" id="loginPassword" required>
                </div>
                <div class="mb-3 form-check">
                    <input type="checkbox" class="form-check-input" id="loginCheck">
                    <label class="form-check-label" for="loginCheck">Remember me</label>
                    <a href="registration.html" class="text-decoration-none ms-2">Don't have an account?</a>
                </div>
                <div class="text-center">
                    <button type="submit" class="btn btn-primary">Login</button>
                </div>
                <div id="loginErrorMessage" class="text-danger mt-3"></div>
            </form>
        </div>
    </section>
    <script>
        const loginForm = document.getElementById('loginForm');
        const loginErrorMessage = document.getElementById('loginErrorMessage');

        loginForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('loginEmail').value;
            const password = document.getElementById('loginPassword').value;

            try {
                const response = await fetch('http://localhost:5000/login', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ email, password })
                });

                if (response.status === 429) {
                    const errorData = await response.json();
                    loginErrorMessage.innerText = errorData.message;
                    return;
                }

                if (!response.ok) {
                    const errorText = await response.text();
                    loginErrorMessage.innerText = errorText;
                    return;
                }

                const data = await response.json();

                localStorage.setItem('jwtToken', data.token);

                window.location.href = '/index.html';

            } catch (error) {
                loginErrorMessage.innerText = "Cannot connect to the server. Please try again later.";
            }
        });
    </script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js" integrity="sha384-MrcW6ZMFYlzcLA8Nl+NtUVF0sA7MsXsP1UyJoMp4YLEuNSfAP+JcXn/tWtIaxVXM" crossorigin="anonymous"></script>
</body>
</html>
